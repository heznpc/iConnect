name: airmcp
description: MCP server for the entire Apple ecosystem — 268 tools across 27 modules (Notes, Reminders, Calendar, Contacts, Mail, Messages, Music, Finder, Safari, System, Photos, Shortcuts, Apple Intelligence, TV, Screen Capture, Maps, Podcasts, Weather, Pages, Numbers, Keynote, Location, Bluetooth). Connect any AI to your Mac.
homepage: https://github.com/heznpc/AirMCP
icon: https://raw.githubusercontent.com/heznpc/AirMCP/main/icons/airmcp-icon-256.png
license: MIT
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      includeShared:
        type: boolean
        default: false
        description: Include shared notes/folders in results
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'airmcp'],
      env: config.includeShared ? { AIRMCP_INCLUDE_SHARED: 'true' } : {}
    })
