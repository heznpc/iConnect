name: Auto Release

# Triggers when a version-bump commit lands on main (e.g., "chore: release v2.6.4").
# Automatically dispatches the CD workflow to publish to npm and create a GitHub Release.
#
# This eliminates the manual step of going to Actions → Publish to npm → Run workflow.

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
          fetch-tags: true

      - name: Check if this is a release commit
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          VERSION=$(node -e "console.log(require('./package.json').version)")

          # Match conventional release commits: "chore: release v*" or "chore(release): v*"
          if echo "$MSG" | grep -qE '^chore(\(release\))?:.*v[0-9]+\.[0-9]+\.[0-9]+'; then
            # Verify the tag doesn't already exist (cd.yml has its own guard too)
            if git rev-parse "v$VERSION" >/dev/null 2>&1; then
              echo "Tag v$VERSION already exists — skipping"
              echo "is_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "Release commit detected: $MSG (v$VERSION)"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Not a release commit — skipping"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  trigger-cd:
    needs: detect-release
    if: needs.detect-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch CD workflow
        run: |
          gh workflow run cd.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
