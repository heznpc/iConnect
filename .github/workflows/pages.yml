name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build Starlight docs site
      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build docs site
        working-directory: docs/site
        run: npm run build

      # Assemble: landing page at root, Starlight at /docs/
      - name: Assemble pages
        run: |
          mkdir -p _site
          # Copy landing page + assets (everything except site/ directory)
          rsync -a --exclude='site/' --exclude='testing.md' docs/ _site/
          # Copy Starlight build to /docs/ subpath
          cp -r docs/site/dist/ _site/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
