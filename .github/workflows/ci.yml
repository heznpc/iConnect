name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for large files
        run: |
          LARGE=$(find . -not -path './.git/*' -not -path './node_modules/*' -type f -size +5M)
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected (>5 MB):"
            echo "$LARGE"
            exit 1
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache tsbuildinfo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: dist/.tsbuildinfo
          key: tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsbuildinfo-

      - name: Check licenses
        run: npx license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-3.0"

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Verify npm signatures
        run: npm audit signatures

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify stats
        run: node scripts/count-stats.mjs --check

      - name: Verify version sync
        run: node scripts/sync-version.mjs --check

      - name: Verify i18n
        run: node scripts/check-i18n.mjs

      # Swift builds require Xcode toolchain (not CommandLineTools)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache Swift build artifacts
        uses: actions/cache@v5
        with:
          path: |
            swift/.build
            ios/.build
          key: swift-${{ runner.os }}-${{ hashFiles('swift/Package.resolved', 'ios/Package.resolved') }}
          restore-keys: |
            swift-${{ runner.os }}-

      - name: Swift — Build AirMCPKit
        run: cd swift && swift build

      - name: Swift — Test AirMCPKit
        run: cd swift && swift test

      - name: Swift — Build AirMCPServer (iOS)
        run: cd ios && swift build

      - name: Swift — Test AirMCPServer
        run: cd ios && swift test
