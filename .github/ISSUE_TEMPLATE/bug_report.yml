name: Bug Report
description: Report a bug in AirMCP
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: AirMCP Version
      description: "Run `npx airmcp --help` to check"
      placeholder: "2.6.2"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - notes
        - reminders
        - calendar
        - contacts
        - mail
        - messages
        - music
        - finder
        - safari
        - system
        - photos
        - shortcuts
        - intelligence
        - tv
        - ui
        - screen
        - maps
        - podcasts
        - weather
        - pages
        - numbers
        - keynote
        - location
        - bluetooth
        - google
        - other / multiple
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Call tool `list_notes` with args `{ limit: 10 }`
        2. See error "..."
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "26.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "22.0.0"

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Desktop
        - Claude Code (CLI)
        - Cursor
        - Windsurf
        - VS Code Copilot
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs or error messages.
      render: shell
